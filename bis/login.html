<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Starbord</title>
  <link rel="stylesheet" href="../src/assets/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-wrapper">
      <div class="login-card">
        <a class="login-back" href="home.html">← retour</a>
        <div class="login-header">
          <h2>STARBORD</h2>
          <p>Connectez vous pour avoir accès aux chapitres complets</p>
        </div>
        <form class="login-form">
          <input type="text" placeholder="Votre prénom" required>
          <input type="email" placeholder="Votre email" required>
          <input type="text" placeholder="Code d’identification" required>
          <button class="login-submit" type="submit">se connecter</button>
          <div class="error" style="display:none;">Erreur d'identification</div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
